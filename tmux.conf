# non login shell
  set -g default-command "${SHELL}"

# default terminal
  set -g default-terminal $TERM
  set-option -ga terminal-overrides ',$TERM:Tc'
  set-option -sa terminal-overrides ',$TERM:RGB'

# remap prefix
  unbind C-b
  set -g prefix M-a

# remap copy-mode
  unbind [
  bind Escape copy-mode

# remap p
  unbind p
  bind p paste-buffer

# mouse mode
  set -g mouse on

# disable clipboard
  set -s set-clipboard off

# start window numbers at 1 to match keyboard order with tmux window order
# renumber windows sequentially after closing any of them
  set -g base-index 1
  set-window-option -g pane-base-index 1
  set -g renumber-windows on

# increase scrollback lines
  set -g history-limit 99999

# clear console
  bind C-l send-keys 'C-l'

# act like vim
  setw -g mode-keys vi

# command-prompt
  bind : command-prompt

# toogle status
  bind Q set -g status

# window navigation
  bind space next-window
  bind bspace previous-window

# window rotation
  bind C-o rotate-window

# split window
  bind % split-window -v -c "#{pane_current_path}"
  bind ! split-window -h -c "#{pane_current_path}"

# fire new window at current path
  bind c new-window -c "#{pane_current_path}"

# break pane
  bind b break-pane -d

# swap panes
  bind > swap-pane -D
  bind < swap-pane -U

# reload tmux
  bind r source-file ~/.tmux.conf \; display-message "Sourced ~/.tmux.conf"

# edit tmux.conf
  bind E new-window -n 'tmux.conf' 'nvim ~/dotfiles/tmux.conf && tmux source ~/.tmux.conf && tmux display "Sourced ~/.tmux.conf"'

# edit vimrc
  bind V new-window -n 'vimrc' 'nvim ~/dotfiles/vimrc'

# edit zshrc
  bind Z new-window -n 'zshrc' 'nvim ~/dotfiles/zshrc && source ~/.zshrc && tmux display "Sourced .zshrc"'

# edit todo
  bind T split-window -h -c ~/ 'nvim ~/.todo/todo.txt'

# launch htop
  bind H split-window -h 'htop'

# panes fine adjustment (1 or 2 cursor cells per bump)
  bind -n S-Left resize-pane -L 2
  bind -n S-Right resize-pane -R 2
  bind -n S-Down resize-pane -D 1
  bind -n S-Up resize-pane -U 1

# panes coarse adjustment (5 or 10 cursor cells per bump)
  bind -n M-Left resize-pane -L 10
  bind -n M-Right resize-pane -R 10
  bind -n M-Down resize-pane -D 5
  bind -n M-Up resize-pane -U 5

# Plugins
  set -g @plugin 'tmux-plugins/tpm'
  set -g @plugin 'tmux-plugins/tmux-sensible'
  set -g @plugin 'tmux-plugins/tmux-online-status'
  set -g @plugin 'tmux-plugins/tmux-resurrect'
  set -g @plugin 'tmux-plugins/tmux-continuum'
  set -g @plugin 'tmux-plugins/tmux-yank'
  set -g @plugin 'nhdaly/tmux-better-mouse-mode'
  set -g @plugin 'christoomey/vim-tmux-navigator'

  set -g @resurrect-strategy-vim 'session'
  set -g @continuum-restore 'on'


# STYLE
  set-option -g message-command-style fg=white
  set-option -g message-style bg=black,fg=white
  set-option -g mode-style fg=white
  set-option -g pane-active-border-style fg=white

  set -g status-bg 'colour235'
  set -g status-justify 'centre'
  set -g status-left-length '100'
  set -g status 'on'
  set -g status-right-length '100'
  setw -g window-status-separator ''

  set -g status-left                   '#[fg=colour232,bg=colour197] #S #[fg=colour197,bg=colour238,nobold,nounderscore,noitalics]#[fg=colour39,bg=colour238] #(whoami) #[fg=colour238,bg=colour235,nobold,nounderscore,noitalics]#[fg=colour235,bg=colour235,nobold,nounderscore,noitalics]'
  set -g status-right                  '#[fg=colour235,bg=colour235,nobold,nounderscore,noitalics]#[fg=colour238,bg=colour235,nobold,nounderscore,noitalics]#[fg=colour39,bg=colour238] #H #[fg=colour197,bg=colour238,nobold,nounderscore,noitalics]#[fg=colour232,bg=colour197] #(rainbarf --battery --remaining --no-rgb) '
  setw -g window-status-format         '#[fg=colour66, bg=colour235] #I:#W '
  setw -g window-status-current-format '#[fg=colour197,bg=colour238] #I:#W#F '

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
  run -b '~/.tmux/plugins/tpm/tpm'
